<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RP Bets - As Minhas Apostas</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1>As Minhas Apostas</h1>

        <p id="message" class="message"></p>

    <script src="/public/my-bets.js"></script>
