<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RP Bets - Dashboard</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1>Dashboard de Apostas RP</h1>
        <div class="topbar-actions">
          <a class="btn-link" href="/my-bets">As Minhas Apostas</a>
          <button id="logout-btn" type="button">Logout</button>
        </div>
      </header>

      <section class="card">
        <h2>Jogos Disponiveis</h2>
        <p class="disclaimer">Apenas para roleplay. Nao existe dinheiro real.</p>
        <div id="games-list" class="games-grid"></div>
      </section>

      <section class="card">
        <h2>Nova Aposta</h2>
        <form id="bet-form">
          <label for="game">Jogo</label>
          <select id="game" name="game" required></select>

          <label for="odd">Odd</label>
          <input id="odd" name="odd" type="text" readonly />

          <label for="amount">Valor da aposta (ficticio)</label>
          <input id="amount" name="amount" type="number" min="1" step="0.01" required />

          <button type="submit">Apostar</button>
        </form>
        <p id="message" class="message"></p>
      </section>
    </main>

    <script src="/public/dashboard.js"></script>
  </body>
</html>
